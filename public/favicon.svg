<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- dark background -->
  <rect width="32" height="32" rx="7" fill="#09090b"/>
  <!-- monitor body -->
  <rect x="4" y="6" width="24" height="15" rx="2" fill="#18181b" stroke="#3f3f46" stroke-width="1.2"/>
  <!-- screen area -->
  <rect x="6" y="8" width="20" height="11" rx="1" fill="#09090b"/>
  <!-- chart polyline -->
  <polyline points="8,16 11,13 13.5,14.5 17,10 21,13 24,11.5"
    stroke="#10b981" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- live dot -->
  <circle cx="24" cy="11.5" r="1.4" fill="#10b981"/>
  <!-- stand neck -->
  <rect x="14.5" y="21" width="3" height="2.5" rx="0.5" fill="#3f3f46"/>
  <!-- base -->
  <rect x="11.5" y="23.5" width="9" height="1.5" rx="0.75" fill="#3f3f46"/>
</svg>